<article class="post-card">
  {% if post.cover_image %}
  <a href="{{ post.get_absolute_url }}" class="post-card__img-wrap">
    <img src="{{ post.cover_image.url }}" alt="{{ post.cover_alt|default:post.title }}" loading="lazy">
  </a>
  {% endif %}
  <div class="post-card__body">
    <div class="post-card__meta">
      {% if post.category %}
      <a href="{{ post.category.get_absolute_url }}" class="post-card__cat" style="--cat-color: {{ post.category.color }}">{{ post.category.name }}</a>
      {% endif %}
      <time datetime="{{ post.published_at|date:'Y-m-d' }}">{{ post.published_at|date:"M j, Y" }}</time>
      <span>{{ post.reading_time }} min read</span>
    </div>
    <h3><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h3>
    <p class="post-card__excerpt">{{ post.excerpt }}</p>
    <div class="post-card__tags">
      {% for tag in post.tags.all|slice:":4" %}
      <a href="{% url 'blog:list' %}?tag={{ tag.slug }}" class="tag">#{{ tag.name }}</a>
      {% endfor %}
    </div>
  </div>
</article>
