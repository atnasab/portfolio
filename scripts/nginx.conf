# /etc/nginx/sites-available/portfolio
# Replace: yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Certbot will update this block for HTTPS redirect
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (managed by Certbot) ────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/portfolio-access.log;
    error_log  /var/log/nginx/portfolio-error.log;

    # ── Client limits ─────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  12;
    client_header_timeout 12;

    # ── Static files (WhiteNoise handles this, but Nginx is faster) ──
    location /static/ {
        alias /home/portfolio/app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    location /media/ {
        alias /home/portfolio/app/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Deny access to hidden files ───────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Block common attack paths ─────────────────────────────
    location ~* \.(php|asp|aspx|jsp)$ {
        return 444;
    }

    # ── Gunicorn proxy ────────────────────────────────────────
    location / {
        proxy_pass http://unix:/run/portfolio/gunicorn.sock;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect   off;
        proxy_read_timeout  30;
        proxy_send_timeout  30;
        proxy_connect_timeout 10;

        # Buffer settings
        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         8 8k;
    }

    # ── Rate limit the contact endpoint ──────────────────────
    location /contact/ {
        limit_req zone=contact burst=5 nodelay;
        proxy_pass http://unix:/run/portfolio/gunicorn.sock;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
